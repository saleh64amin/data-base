<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fingerprint Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080c10;
      --surface: #0d1520;
      --border: #1a2e45;
      --accent: #00d4ff;
      --accent2: #00ff88;
      --danger: #ff3c5a;
      --text: #c8dff0;
      --muted: #4a6a8a;
      --glow: 0 0 20px rgba(0,212,255,0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,212,255,0.03) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,212,255,0.03) 40px);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 720px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 42px; height: 42px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: var(--glow);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 10px rgba(0,212,255,0.2); }
      50% { box-shadow: 0 0 30px rgba(0,212,255,0.5); }
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff;
    }

    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .card-title {
      font-size: 0.7rem;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    @media (max-width: 500px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
    }

    input {
      background: rgba(0,212,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
      padding: 12px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      width: 100%;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      width: 100%;
      justify-content: center;
    }

    .btn-primary:hover {
      background: #33ddff;
      box-shadow: 0 0 20px rgba(0,212,255,0.4);
      transform: translateY(-1px);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      padding: 6px 14px;
      font-size: 0.75rem;
      border-radius: 6px;
    }

    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
      box-shadow: 0 0 14px rgba(255,60,90,0.4);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 24px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      z-index: 100;
      transition: transform 0.3s ease, opacity 0.3s;
      opacity: 0;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: var(--accent2); color: var(--accent2); }
    .toast.error { border-color: var(--danger); color: var(--danger); }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      text-align: left;
      padding: 10px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid rgba(26,46,69,0.5);
      transition: background 0.15s;
    }

    tbody tr:hover { background: rgba(0,212,255,0.04); }

    td {
      padding: 12px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      vertical-align: middle;
    }

    td.fingerprint-cell {
      color: var(--accent2);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    td.username-cell { color: #fff; font-weight: 600; }
    td.date-cell { color: var(--muted); font-size: 0.75rem; }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    .count-badge {
      display: inline-block;
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.3);
      color: var(--accent);
      border-radius: 20px;
      padding: 2px 12px;
      font-size: 0.7rem;
      font-family: 'Share Tech Mono', monospace;
      margin-left: 10px;
      vertical-align: middle;
    }

    .loading {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,212,255,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-line">
        <div class="logo-icon">🔐</div>
        <h1>FP Manager</h1>
      </div>
      <div class="subtitle">Fingerprint &amp; Username Database</div>
    </header>

    <!-- Add Form -->
    <div class="card">
      <div class="card-title">// Add New Entry</div>
      <div class="form-grid">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="e.g. john_doe" autocomplete="off"/>
        </div>
        <div class="field">
          <label for="fingerprint">Fingerprint</label>
          <input type="text" id="fingerprint" placeholder="e.g. A1B2C3D4..." autocomplete="off"/>
        </div>
      </div>
      <button class="btn btn-primary" onclick="addEntry()">
        <span>＋</span> Store in Database
      </button>
    </div>

    <!-- Records Table -->
    <div class="card">
      <div class="card-title">
        // Stored Records
        <span class="count-badge" id="count">0</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Username</th>
              <th>Fingerprint</th>
              <th>Date Added</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="records-body">
            <tr>
              <td colspan="4" class="empty-state">Loading records...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = `http://${window.location.hostname}:3000/api/fingerprints`;

    async function loadRecords() {
      try {
        const res = await fetch(API);
        const json = await res.json();
        const tbody = document.getElementById('records-body');
        const count = document.getElementById('count');

        if (!json.success || json.data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4" class="empty-state">No records found. Add one above.</td></tr>`;
          count.textContent = '0';
          return;
        }

        count.textContent = json.data.length;
        tbody.innerHTML = json.data.map(entry => `
          <tr>
            <td class="username-cell">${escape(entry.username)}</td>
            <td class="fingerprint-cell" title="${escape(entry.fingerprint)}">${escape(entry.fingerprint)}</td>
            <td class="date-cell">${new Date(entry.createdAt).toLocaleString()}</td>
            <td><button class="btn btn-danger" onclick="deleteEntry('${entry._id}')">Delete</button></td>
          </tr>
        `).join('');
      } catch (err) {
        document.getElementById('records-body').innerHTML =
          `<tr><td colspan="4" class="empty-state">⚠ Could not connect to server.</td></tr>`;
      }
    }

    async function addEntry() {
      const username = document.getElementById('username').value.trim();
      const fingerprint = document.getElementById('fingerprint').value.trim();

      if (!username || !fingerprint) {
        showToast('Both username and fingerprint are required.', 'error');
        return;
      }

      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, fingerprint })
        });
        const json = await res.json();

        if (json.success) {
          document.getElementById('username').value = '';
          document.getElementById('fingerprint').value = '';
          showToast('Entry stored successfully!', 'success');
          loadRecords();
        } else {
          showToast(json.message || 'Failed to save.', 'error');
        }
      } catch (err) {
        showToast('Server error. Is the server running?', 'error');
      }
    }

    async function deleteEntry(id) {
      if (!confirm('Delete this entry?')) return;

      try {
        const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
        const json = await res.json();

        if (json.success) {
          showToast('Entry deleted.', 'success');
          loadRecords();
        } else {
          showToast(json.message || 'Delete failed.', 'error');
        }
      } catch (err) {
        showToast('Server error.', 'error');
      }
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => { t.className = 'toast'; }, 3000);
    }

    function escape(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') addEntry();
    });

    loadRecords();
  </script>
</body>
</html>
